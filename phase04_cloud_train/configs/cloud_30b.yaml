model_name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
output_dir: outputs/adapters/cloud_30b
max_seq_length: 2048
load_in_4bit: false
lora_rank: 32
lora_alpha: 32
lora_dropout: 0.05
learning_rate: 0.0002
num_train_epochs: 1
